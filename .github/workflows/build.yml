name: Build, Validate, and Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload Application Package
        uses: actions/upload-artifact@v4
        with:
          name: Amy-Elite-Suite-App
          path: ./dist
