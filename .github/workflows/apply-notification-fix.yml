name: Apply Notification Fix

on:
  push:
    paths:
      - '.github/workflows/apply-notification-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch scanner notification recreation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('app/src/main/java/com/amyelitesuite/ScannerService.kt')
          s = p.read_text()

          s = s.replace(
          '''    @Volatile private var lastHtfScanAt = 0L
          ''',
          '''    @Volatile private var lastHtfScanAt = 0L
              @Volatile private var foregroundStarted = false
              @Volatile private var lastForegroundUpdateAt = 0L
              private var lastForegroundSignature = ""
          '''
          )

          s = s.replace(
          '''        val text = "M15:${contextShort()} | HTF:$htfBias | Score:$setupScore | $setupGrade"
                  val big = "$text\\nTarget: ${targetText()}\\nInvalid: ${invalidText()}"
          ''',
          '''        val text = "M15:${contextShort()} | HTF:$htfBias | Score:$setupScore | $setupGrade"
                  val big = "$text\\nTarget: ${targetText()}\\nInvalid: ${invalidText()}"
                  val now = System.currentTimeMillis()
                  val signature = "$text|${targetText()}|${invalidText()}"
                  if (foregroundStarted && signature == lastForegroundSignature && now - lastForegroundUpdateAt < 60_000L) return
                  foregroundStarted = true
                  lastForegroundSignature = signature
                  lastForegroundUpdateAt = now
          '''
          )

          s = s.replace(
          '''            events.add(
                      NativeEvent(
                          "M15-${m15BiasDir}-${latest.openTime / 900L}",
                          contextTitle(),
                          marketReadMessage("M15 Bias ${contextShort()}", m15Reason)
                      )
                  )

          ''',
          ''''''
          )

          s = s.replace('''                    startForegroundServiceNotification()\n                    startWebSocket()''', '''                    startWebSocket()''')

          p.write_text(s)
          PY
      - name: Remove one-time workflow
        run: rm -f .github/workflows/apply-notification-fix.yml
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/amyelitesuite/ScannerService.kt .github/workflows/apply-notification-fix.yml
          git commit -m "fix: stop instant scanner notification recreation" || exit 0
          git push
